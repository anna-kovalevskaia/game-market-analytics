# Game Market Analytics - Docker Compose
# Local development setup: LocalExecutor (no Redis, no Celery workers)
# Services: PostgreSQL (Airflow metadata), ClickHouse (analytics DWH), Airflow

---
x-airflow-common:
  &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY:-}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__AUTH_MANAGER: 'airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session'
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    # ClickHouse connection for dbt and DAGs
    CLICKHOUSE_HOST: clickhouse
    CLICKHOUSE_PORT: '8123'
    CLICKHOUSE_USER: ${CLICKHOUSE_AIRFLOW_USER:-airflow_user}
    CLICKHOUSE_PASSWORD: ${CLICKHOUSE_AIRFLOW_PASSWORD:-}
    CLICKHOUSE_DB: ${CLICKHOUSE_DB:-analytics}
    PYTHONPATH: '/opt/airflow:${PYTHONPATH:-}'
  volumes:
    # DAGs and dbt project
    - ${AIRFLOW_PROJ_DIR:-.}/../dags:/opt/airflow/dags
    - ${AIRFLOW_PROJ_DIR:-.}/../tmp:/opt/airflow/tmp
    - ${AIRFLOW_PROJ_DIR:-.}/../dags_utils:/opt/airflow/dags_utils
    - ${AIRFLOW_PROJ_DIR:-.}/../dbt:/opt/airflow/dbt
    # Airflow internals
    - ${AIRFLOW_PROJ_DIR:-.}/logs:/opt/airflow/logs
    - ${AIRFLOW_PROJ_DIR:-.}/config:/opt/airflow/config
    - ${AIRFLOW_PROJ_DIR:-.}/plugins:/opt/airflow/plugins
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    &airflow-common-depends-on
    postgres:
      condition: service_healthy

services:

  # ------------------------------------------------------------------
  # PostgreSQL — Airflow metadata database
  # Stores DAG runs, task states, connections, variables
  # ------------------------------------------------------------------
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
      POSTGRES_DB: ${POSTGRES_DB:-}
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-postgres}"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  # ------------------------------------------------------------------
  # ClickHouse — analytics DWH
  # Stores raw, staging, core and marts layers
  # HTTP interface: localhost:8123
  # Native interface: localhost:9000
  # ------------------------------------------------------------------
  clickhouse:
    image: clickhouse/clickhouse-server:25.8.26
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-analytics}
      CLICKHOUSE_ADMIN_USER: ${CLICKHOUSE_ADMIN_USER:-admin}
      CLICKHOUSE_ADMIN_PASSWORD: ${CLICKHOUSE_ADMIN_PASSWORD}
      CLICKHOUSE_AIRFLOW_USER: ${CLICKHOUSE_AIRFLOW_USER:-airflow_user}
      CLICKHOUSE_AIRFLOW_PASSWORD: ${CLICKHOUSE_AIRFLOW_PASSWORD}
    ports:
      - "127.0.0.1:8123:8123"
      - "127.0.0.1:9000:9000"
    volumes:
      - clickhouse-db-volume:/var/lib/clickhouse
      - ./clickhouse/users.d:/etc/clickhouse-server/users.d:ro
      - ./clickhouse/init.sh:/docker-entrypoint-initdb.d/init.sh:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      retries: 5
      start_period: 10s
    restart: always

  # ------------------------------------------------------------------
  # Airflow Webserver — UI on localhost:8080
  # ------------------------------------------------------------------
  airflow-webserver:
    <<: *airflow-common
    command: api-server
    ports:
      - "8088:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  # ------------------------------------------------------------------
  # Airflow Scheduler — executes DAGs, runs dbt via Cosmos (VIRTUALENV mode)
  # dbt project is mounted at /opt/airflow/dbt
  # dbt venv is pre-built in Dockerfile.airflow at /opt/airflow/dbt_venv
  # ------------------------------------------------------------------
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  # ------------------------------------------------------------------
  # Airflow Init — runs once on first start
  # Migrates DB schema, creates admin user
  # ------------------------------------------------------------------
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        chown -R "${AIRFLOW_UID}:0" /opt/airflow/{logs,plugins,tmp}
        exec /entrypoint airflow version
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}
      _PIP_ADDITIONAL_REQUIREMENTS: ''
    user: "0:0"

volumes:
  postgres-db-volume:
  clickhouse-db-volume: