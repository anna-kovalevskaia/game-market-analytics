game_market_analytics:
  target: local
  outputs:
    local:
      type: clickhouse
      host: "{{ env_var('CLICKHOUSE_HOST', 'localhost') }}"
      port: "{{ env_var('CLICKHOUSE_PORT', '8123') | int }}"
      user: "{{ env_var('CLICKHOUSE_USER', 'default') }}"
      password: "{{ env_var('CLICKHOUSE_PASSWORD', '') }}"
      secure: "{{ env_var('CLICKHOUSE_SECURE', 'false') == 'true' }}"
      schema: "{{ env_var('CLICKHOUSE_DB', 'analytics') }}"
      threads: 4
      connect_timeout: 10
      send_receive_timeout: 300
      verify: false

    ci:
      type: clickhouse
      host: "{{ env_var('CLICKHOUSE_HOST', 'localhost') }}"
      port: "{{ env_var('CLICKHOUSE_PORT', '8123') | int }}"
      user: "{{ env_var('CLICKHOUSE_USER', 'default') }}"
      password: "{{ env_var('CLICKHOUSE_PASSWORD', '') }}"
      secure: false
      schema: "{{ env_var('CLICKHOUSE_DB', 'analytics') }}"
      threads: 2
      connect_timeout: 5
      verify: false